name: CI-CD to EC2

on:
 push:
   branches:
     - main

jobs:
 deploy:
   runs-on: ubuntu-latest

   steps:

   - name: Checkout Code
     uses: actions/checkout@v3

   - name: Configure AWS Credentials
     uses: aws-actions/configure-aws-credentials@v2
     with:
       aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
       aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
       aws-region: ${{ secrets.AWS_REGION }}

   - name: Login to ECR
     run: |
       aws ecr get-login-password --region $AWS_REGION | \
       docker login --username AWS --password-stdin ${{ secrets.ECR_REPOSITORY }}

   - name: Build Docker Image
     run: docker build -t ci-cd-app .

   - name: Tag Image
     run: docker tag ci-cd-app:latest ${{ secrets.ECR_REPOSITORY }}:latest

   - name: Push to ECR
     run: docker push ${{ secrets.ECR_REPOSITORY }}:latest

   - name: Deploy to EC2
     uses: appleboy/ssh-action@v0.1.6
     with:
       host: ${{ secrets.EC2_HOST }}
       username: ec2-user
       key: ${{ secrets.EC2_SSH_KEY }}
       script: |
         aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin ${{ secrets.ECR_REPOSITORY }}

         docker stop my-app || true
         docker rm my-app || true

         docker pull ${{ secrets.ECR_REPOSITORY }}:latest

         docker run -d -p 3000:80 --name my-app ${{ secrets.ECR_REPOSITORY }}:latest
